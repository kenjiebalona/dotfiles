# to reload .tmux.conf
# prefix = <C-b>
unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "screen-256color"

# btop binding
bind b popup -d '#{pane_current_path}' -E -h 95% -w 95% -x 100% "btop"

# vim advice :checkhealth
set-option -g focus-events on
set-option -sg escape-time 0
set-option -a terminal-features 'xterm-256color:RGB'

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on
set -g base-index 1

# enable vim in tmux 
# <C-b>[
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

# status
set -g status-position bottom

set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# initialize tmux plugins manager
run '~/.tmux/plugins/tpm/tpm'

# <C-b><S-i> to install packages

# =============================================================================
# Ayu Dark Theme (NvChad variant)
# =============================================================================

# Colors Reference:
# black          = #0B0E14
# statusline_bg  = #12151b
# one_bg         = #1c1f25
# lightbg/line   = #24272d
# white          = #ced4df
# green          = #AAD84C
# yellow         = #E7C547
# blue           = #36A3D9
# orange         = #ffa455
# red            = #F07178
# cyan           = #95E6CB
# light_grey     = #54575d
# grey           = #33363c

# --- Status Bar ---
set-option -g status on
set-option -g status-justify absolute-centre
set-option -g status-left-length 99
set-option -g status-right-length 99

# --- Messages ---
set-option -g message-style "fg=#ced4df,bg=#0B0E14"
set-option -g message-command-style "fg=#ced4df,bg=#0B0E14"

# --- Status Style ---
set-option -g status-style "fg=#ced4df,bg=#12151b"

# --- Window Status ---
set-window-option -g window-status-style "fg=#12151b,bg=#12151b"
set-window-option -g window-status-activity-style "fg=#12151b,bg=#12151b"
set-window-option -g window-status-separator ""

# --- Window Style ---
set-option -g window-style "fg=#54575d"
set-option -g window-active-style "fg=#ced4df"

# --- Pane Borders ---
set-option -g pane-border-style "fg=#24272d,bg=#0B0E14"
set-option -g pane-active-border-style "fg=#AAD84C,bg=#0B0E14"

# --- Display Panes ---
set-option -g display-panes-active-colour "#E7C547"
set-option -g display-panes-colour "#36A3D9"

# --- Status Left ---
# set-option -g status-left "#[fg=#0B0E14,bg=#AAD84C,bold] #S #{prefix_highlight}#[fg=#AAD84C,bg=#12151b,nobold,nounderscore,noitalics]"
set-option -g status-left ""

# --- Status Right ---
# set-option -g status-right "#[fg=#ced4df,bg=#12151b,nounderscore,noitalics]  %R    %d.%m.%Y #[fg=#33363c,bg=#12151b]#[fg=#ced4df,bg=#33363c] #[fg=#AAD84C,bg=#33363c,nobold,nounderscore,noitalics]#[fg=#0B0E14,bg=#AAD84C,bold] #h "
set-option -g status-right ""

# --- Window Status Formats ---
set-window-option -g window-status-format "#[fg=#12151b,bg=#12151b,nobold,nounderscore,noitalics]#[fg=#54575d,bg=#12151b] #I  #W #[fg=#12151b,bg=#12151b,nobold,nounderscore,noitalics]"
set-window-option -g window-status-current-format "#[fg=#12151b,bg=#E7C547,nobold,nounderscore,noitalics]#[fg=#0B0E14,bg=#E7C547,nobold] #I  #W #[fg=#E7C547,bg=#12151b,nobold,nounderscore,noitalics]"

